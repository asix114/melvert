<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Юридический сервис | Админ-панель</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', system-ui; }
        .hidden-tab { display: none; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="loginPanel" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-lg w-96">
            <h2 class="text-2xl font-bold mb-6 text-center">Юридический сервис</h2>
            <input type="password" id="adminPass" placeholder="Пароль" class="w-full p-3 border rounded-xl mb-4">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Войти</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden-tab">
        <div class="flex min-h-screen">
            <div class="w-72 bg-white shadow-lg p-5">
                <h2 class="text-xl font-bold mb-6">📁 Меню</h2>
                <nav>
                    <button onclick="showSection('clients')" class="w-full text-left p-3 rounded-lg hover:bg-gray-100 mb-2">📋 Клиенты</button>
                    <button onclick="showSection('newClient')" class="w-full text-left p-3 rounded-lg hover:bg-gray-100 mb-2">➕ Новый клиент</button>
                    <button onclick="showSection('generate')" class="w-full text-left p-3 rounded-lg hover:bg-gray-100 mb-2">🤖 Генерация документа</button>
                </nav>
            </div>
            <div class="flex-1 p-6">
                <div id="clientsSection" class="section">
                    <h2 class="text-2xl font-bold mb-5">📋 Клиенты</h2>
                    <div id="clientsList" class="space-y-3"></div>
                </div>
                <div id="newClientSection" class="section hidden-tab">
                    <h2 class="text-2xl font-bold mb-5">➕ Новый клиент</h2>
                    <div class="bg-white p-6 rounded-xl shadow">
                        <input type="text" id="clientName" placeholder="Имя и фамилия" class="w-full p-3 border rounded-xl mb-3">
                        <input type="text" id="clientPhone" placeholder="Телефон" class="w-full p-3 border rounded-xl mb-3">
                        <input type="text" id="clientAddress" placeholder="Адрес" class="w-full p-3 border rounded-xl mb-3">
                        <textarea id="clientQuestion" placeholder="Вопрос клиента" rows="3" class="w-full p-3 border rounded-xl mb-3"></textarea>
                        <button onclick="saveClient()" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold">Сохранить клиента</button>
                    </div>
                </div>
                <div id="generateSection" class="section hidden-tab">
                    <h2 class="text-2xl font-bold mb-5">🤖 Генерация документа через DeepSeek</h2>
                    <div class="bg-white p-6 rounded-xl shadow">
                        <select id="docClient" class="w-full p-3 border rounded-xl mb-3"></select>
                        <input type="text" id="docType" placeholder="Тип документа (иск, жалоба, договор...)" class="w-full p-3 border rounded-xl mb-3">
                        <textarea id="docDetails" placeholder="Детали дела" rows="5" class="w-full p-3 border rounded-xl mb-3"></textarea>
                        <button onclick="generateDocument()" class="bg-purple-600 text-white px-6 py-3 rounded-xl font-bold">🚀 Сгенерировать документ</button>
                        <div id="generatedDoc" class="mt-5 p-4 bg-gray-50 rounded-xl hidden">
                            <h3 class="font-bold mb-2">📄 Сгенерированный документ:</h3>
                            <pre id="docContent" class="whitespace-pre-wrap text-sm"></pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const DEEPSEEK_API_KEY = 'sk-697641e8049e493c8056f35655a14c19';
        const SHEET_ID = '1m2FXtM_WnRs44oxbn6ge5tLVkZTqERJVuIP-FBlC4Q0';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtOB88j-k3mVIxGUA34MpHiHxB63HfcQZWwRSuW9S0VlCpkZXB26xExruDb0vgtUCz/exec';
        let clients = [];

        // Вход
        function checkLogin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === 'admin123') {
                document.getElementById('loginPanel').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden-tab');
                loadClientsFromSheet();
                showSection('clients');
            } else { alert('Неверный пароль'); }
        }

        // Загрузка клиентов из Google Sheets (второй лист "CRM")
        async function loadClientsFromSheet() {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`; // gid=0 — первый лист, если CRM на втором — уточним
            try {
                const response = await fetch(url);
                const text = await response.text();
                const json = JSON.parse(text.substring(47).slice(0, -2));
                const rows = json.table.rows;
                clients = [];
                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i].c;
                    if (row && row[0] && row[0].v) {
                        clients.push({
                            id: i,
                            name: row[0]?.v || '',
                            phone: row[1]?.v || '',
                            address: row[2]?.v || '',
                            question: row[3]?.v || '',
                            doc: row[4]?.v || ''
                        });
                    }
                }
                renderClients();
                updateClientSelect();
            } catch (error) {
                clients = [];
                renderClients();
                alert('Ошибка загрузки: ' + error.message);
            }
        }

        function renderClients() {
            const container = document.getElementById('clientsList');
            if (clients.length === 0) {
                container.innerHTML = '<div class="bg-white p-4 rounded-xl shadow text-center">Нет клиентов. Добавьте первого.</div>';
                return;
            }
            container.innerHTML = clients.map(client => `
                <div class="bg-white p-4 rounded-xl shadow">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">${escapeHtml(client.name)}</h3>
                            <p class="text-gray-600">📞 ${escapeHtml(client.phone)} | 📍 ${escapeHtml(client.address)}</p>
                            <p class="mt-2"><strong>Вопрос:</strong> ${escapeHtml(client.question)}</p>
                            ${client.doc ? `<p class="mt-2"><strong>📄 Документ:</strong> ${escapeHtml(client.doc)}</p>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateClientSelect() {
            const select = document.getElementById('docClient');
            select.innerHTML = '<option value="">-- Выберите клиента --</option>';
            clients.forEach(client => {
                select.innerHTML += `<option value="${client.id}">${escapeHtml(client.name)}</option>`;
            });
        }

        // Сохранение клиента через Apps Script
        async function saveClient() {
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const address = document.getElementById('clientAddress').value;
            const question = document.getElementById('clientQuestion').value;

            if (!name || !phone) {
                alert('Заполните имя и телефон');
                return;
            }

            const newRow = [[name, phone, address, question, '']];
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'addClient', data: newRow })
                });
                
                document.getElementById('clientName').value = '';
                document.getElementById('clientPhone').value = '';
                document.getElementById('clientAddress').value = '';
                document.getElementById('clientQuestion').value = '';
                
                await loadClientsFromSheet();
                showSection('clients');
                alert('✅ Клиент добавлен в таблицу');
            } catch (error) {
                alert('❌ Ошибка при сохранении: ' + error.message);
            }
        }

        // Генерация документа
        async function generateDocument() {
            const clientId = document.getElementById('docClient').value;
            const docType = document.getElementById('docType').value;
            const details = document.getElementById('docDetails').value;
            if (!clientId || !docType || !details) { alert('Заполните все поля'); return; }
            const client = clients.find(c => c.id == clientId);
            if (!client) return;

            const prompt = `Составь документ типа "${docType}" для клиента ${client.name}. Детали дела: ${details}. Документ на русском языке, официально-деловым стилем.`;

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DEEPSEEK_API_KEY },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: prompt }], temperature: 0.7 })
                });
                if (!response.ok) { const err = await response.json(); throw new Error(err.error?.message || `HTTP ${response.status}`); }
                const data = await response.json();
                if (!data.choices || !data.choices[0]?.message?.content) throw new Error('Пустой ответ');
                document.getElementById('docContent').innerText = data.choices[0].message.content;
                document.getElementById('generatedDoc').classList.remove('hidden');
            } catch (error) { alert('❌ Ошибка DeepSeek: ' + error.message); }
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden-tab'));
            if (section === 'clients') document.getElementById('clientsSection').classList.remove('hidden-tab');
            if (section === 'newClient') document.getElementById('newClientSection').classList.remove('hidden-tab');
            if (section === 'generate') document.getElementById('generateSection').classList.remove('hidden-tab');
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    </script>
</body>
</html>
